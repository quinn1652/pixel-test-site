      /* Big button answer style — replicates 2021-03-02 .big_button pattern.
         The radio <input> is hidden; the entire <label> is the visible button.
         This is the structural change that causes fbevents.js to fire
         SubscribedButtonClick on every answer selection. */
      .big_button {
        margin-bottom: 6px;
      }
      .big_button label.radio {
        display: block;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 12px 16px;
        cursor: pointer;
        background: #fff;
        font-weight: normal;
        margin: 0;

        border-color: #aaa;

      .big_button input[type="radio"] {
        display: none;

      .big_button label.radio.checked {
