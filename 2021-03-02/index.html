    <!-- Meta Pixel Code -->
    <script>
      (function () {
        var config = window.PIXEL_CONFIG || {};
        var pixelId = config.pixelId || "YOUR_TEST_PIXEL_ID";
        var fbeventsUrl =
          config.fbeventsUrl ||
          "https://connect.facebook.net/en_US/fbevents.js";
        var isDryRun =
          config.dryRun === true || pixelId === "YOUR_TEST_PIXEL_ID";

        if (isDryRun) {
          window.fbq = function () {
            var args = Array.prototype.slice.call(arguments);
            console.log(
              "[DRY RUN] fbq(" +
                args
                  .map(function (a) {
                    return JSON.stringify(a);
                  })
                  .join(", ") +
                ")",
            );
          };
          window._fbq = window.fbq;
          console.warn(
            "[pixel-test-site] Dry-run mode. Set dryRun: false in pixel-config.js to transmit beacons.",
          );
        } else {
          !(function (f, b, e, v, n, t, s) {
            if (f.fbq) return;
            n = f.fbq = function () {
              n.callMethod
                ? n.callMethod.apply(n, arguments)
                : n.queue.push(arguments);
            };
            if (!f._fbq) f._fbq = n;
            n.push = n;
            n.loaded = !0;
            n.version = "2.0";
            n.queue = [];
            t = b.createElement(e);
            t.async = !0;
            t.src = v;
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s);
          })(window, document, "script", fbeventsUrl);
        }

        fbq("init", pixelId);
        fbq("track", "PageView", {
          source: window.location.hostname,
        });

        document.write(
          '<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=' +
            pixelId +
            '&ev=PageView&noscript=1"/></noscript>',
        );
      })();
    </script>
    <!-- End Meta Pixel Code -->

    <style>
      /* Test banner */
      #test-env-banner {
        background: #333;
        color: #fff;
        text-align: center;
        padding: 7px 14px;
        font-family: monospace;
        font-size: 13px;
        position: sticky;
        top: 0;
        z-index: 9999;
      }
      #test-env-banner a {
        color: #adf;
      }

      /* Progress bar */
      #quiz-progress-bar {
        height: 4px;
        background: #e0e0e0;
        margin-bottom: 16px;
      }
      #quiz-progress-fill {
        height: 100%;
        background: #333;
        width: 0%;
        transition: width 0.3s;
      }

      /* Horizontal clipping lives on .slick-list (Slick's own container).
           Outer wrapper must NOT have overflow:hidden — it would clip
           dynamically expanding content like the income section. */
      .slider.questionnaire .slick-list {
        overflow: hidden;
      }

      /* Utility */
      .hidden {
        display: none !important;
      }

      /* Big button answer style — replicates 2021-03-02 .big_button pattern.
           The radio <input> is hidden; the entire <label> is the visible button.
           This is the structural change that causes fbevents.js to fire
           SubscribedButtonClick on every answer selection. */
      .big_button {
        margin-bottom: 6px;
      }
      .big_button label.radio {
        display: block;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 12px 16px;
        cursor: pointer;
        background: #fff;
        font-weight: normal;
        margin: 0;
        transition:
          background 0.15s,
          border-color 0.15s;
        user-select: none;
      }
      .big_button label.radio:hover {
        background: #f5f5f5;
        border-color: #aaa;
      }
      .big_button input[type="radio"] {
        display: none;
      }
      .big_button label.radio.checked {
        background: #e8f4fd;
        border-color: #337ab7;
        color: #2b6ca3;
        font-weight: bold;
      }

      /* Show-more link */
      .show-more-wrapper {
        margin-top: 6px;
      }
      .show-more-wrapper a {
        font-size: 0.9em;
      }

      /* Checkbox labels.
           Bootstrap 3 sets position:absolute; margin-left:-20px on
           .checkbox input[type="checkbox"], which pulls inputs out of
           the Slick overflow clip and makes them bleed across slides.
           Override to keep them in normal flow. */
      label.checkbox {
        display: block;
        font-weight: normal;
        cursor: pointer;
        padding: 4px 0;
      }
      label.checkbox input[type="checkbox"] {
        position: static;
        margin-left: 0;
        margin-right: 8px;
      }

      /* Completion screen */
      .next .questionnaire-content.center {
        text-align: center;
        padding: 24px 0;
      }
    </style>
  </head>

                  <!-- =============================================================
                                 SLIDE INVENTORY — one slide per distinct interaction pattern
                                 =============================================================
                                 Slide 1: big_button + redirect type (answer-redirect class,

                                 Slide 2: big_button + show-more (hidden rows revealed by link)

                                 Slide 4: select auto-advance (slider-next-select on select)

                                 [Completion screen outside slider]
                                 ============================================================= -->
                  <div
                    class="slider questionnaire"
                    id="start-question-slider"
                    rel="0"
                  >

                                     inputs: class="answer-redirect", data-question-type="redirect"
                                     labels: redirect-0/1, data-redirect-modal targeting modal IDs -->

                      class="question QUIZ_A"
                    >

                                  data-question-type="redirect"

                                  type="radio"
                                  id="redirect"

                                  data-question-id="2285"
                                  class="answer-redirect"

                                  data-question-type="redirect"

                    <!-- Slide 2 — big_button with show-more

                                  data-question-type="radio"

                    <!-- Slide 4 — select auto-advance

                    <div

                    >
                      <div class="questionnaire-content">

                            ><strong

                            </div>
                          </div>

                                     Does NOT use slider-next-select on the select itself. -->

                    >

                          </div>

                                type="checkbox"

                                class="answer"
                                name="quiz_answers[QUIZ_B][1430][]"
                                value="4750"
                              />I'm disabled

                              <input
                                type="checkbox"
                                id="1430"
                                data-question-type="income_checkbox"
                                data-question-id="1430"
                                class="answer"
                                name="quiz_answers[QUIZ_B][1430][]"
                                value="4751"
                              />I'm unemployed
                            </label>
                            <label class="checkbox">
                              <input
                                type="checkbox"
                                id="1430"
                                data-question-type="income_checkbox"
                                data-question-id="1430"
                                class="answer"
                                name="quiz_answers[QUIZ_B][1430][]"

                      </div>
                    </div>
                  </div>
                  <!-- end #start-question-slider -->

                  <!-- Completion screen — outside slider, shown after Slide 6.

                                 from mid-form Next anchors; fbevents.js reports this difference

                <!-- end col-md-6 -->
              </div>
              <!-- end row -->
            </form>
          </div>
        </section>
      </div>
      <!-- end #content-container -->
    </div>
    <!-- end #body-container -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.4.1/js/bootstrap.min.js"></script>

  </body>
</html>
