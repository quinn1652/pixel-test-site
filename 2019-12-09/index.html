    <!-- Meta Pixel Code -->
    <script>
      (function () {
        var config = window.PIXEL_CONFIG || {};
        var pixelId = config.pixelId || "YOUR_TEST_PIXEL_ID";
        var fbeventsUrl = './fbevents.js';
        var isDryRun =
          config.dryRun === true || pixelId === "YOUR_TEST_PIXEL_ID";

        if (isDryRun) {
          window.fbq = function () {
            var args = Array.prototype.slice.call(arguments);
            console.log(
              "[DRY RUN] fbq(" +
                args
                  .map(function (a) {
                    return JSON.stringify(a);
                  })
                  .join(", ") +
                ")",
            );
          };
          window._fbq = window.fbq;
          console.warn(
            "[pixel-test-site] Dry-run mode. Set dryRun: false in pixel-config.js to transmit beacons.",
          );
        } else {
          // Exact Meta Pixel base code — fbeventsUrl passed as v (4th arg) per Facebook standard
          !(function (f, b, e, v, n, t, s) {
            if (f.fbq) return;
            n = f.fbq = function () {
              n.callMethod
                ? n.callMethod.apply(n, arguments)
                : n.queue.push(arguments);
            };
            if (!f._fbq) f._fbq = n;
            n.push = n;
            n.loaded = !0;
            n.version = "2.0";
            n.queue = [];
            t = b.createElement(e);
            t.async = !0;
            t.src = v;
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s);
          })(window, document, "script", fbeventsUrl);
        }

        fbq("init", pixelId);
        fbq("track", "PageView");

        // Write noscript fallback with correct pixel ID
        document.write(
          '<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=' +
            pixelId +
            '&ev=PageView&noscript=1"/></noscript>',
        );
      })();
    </script>
    <!-- End Meta Pixel Code -->

    <!-- Google Tag Manager — ID from pixel-config.js -->
    <script>
      (function () {
        var gtmId = window.PIXEL_CONFIG && window.PIXEL_CONFIG.gtmId;

        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
        var f = document.getElementsByTagName('script')[0];
        var j = document.createElement('script');
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=' + gtmId;
        f.parentNode.insertBefore(j, f);
      })();
    </script>

      /* Bootstrap 3 sets position:absolute; margin-left:-20px on inputs inside

        margin-left: 0;
        margin-right: 6px;
        vertical-align: middle;
      }
      /* Bootstrap also adds padding-left:20px to .radio label — zero it out since

      label.radio {

      }

      /* Checkbox inputs same fix */
